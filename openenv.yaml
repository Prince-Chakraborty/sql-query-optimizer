name: sql-query-optimizer
version: "1.0.0"
description: >
  A real-world OpenEnv environment where an AI agent learns to fix
  and optimize SQL queries through actual SQLite execution feedback.
  Tasks range from easy (fix broken JOIN) to hard (write CTE report).
author: princechakraborty
tags:
  - sql
  - database
  - optimization
  - real-world
tasks:
  - id: task_easy
    name: "Fix the Broken Query"
    difficulty: easy
    max_steps: 5
  - id: task_medium
    name: "Eliminate the N+1 Subquery"
    difficulty: medium
    max_steps: 8
  - id: task_hard
    name: "Monthly Revenue Report with CTEs"
    difficulty: hard
    max_steps: 10
endpoints:
  - /reset
  - /step
  - /state
  - /tasks
  - /grader
  - /baseline
